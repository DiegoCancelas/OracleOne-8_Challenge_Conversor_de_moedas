name: Testes Unitários

on:
  pull_request: # O gatilho é a abertura ou atualização de uma PR
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Rodar Testes com Maven
        run: mvn test # Comando que executa os testes unitários
